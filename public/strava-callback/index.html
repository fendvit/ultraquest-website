<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Opening UltraQuest…</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      background: #0d0f13; color: #f4f6fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; text-align: center;
      padding: 24px;
    }
    .card { max-width: 340px; }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 20px;
      border: 3px solid rgba(255,255,255,.15); border-top-color: #ff6a2b;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.15rem; margin: 0 0 6px; }
    p { color: #9aa3b2; font-size: .9rem; margin: 0 0 18px; line-height: 1.5; }
    a.btn {
      display: inline-block; background: #ff6a2b; color: #fff; text-decoration: none;
      padding: 11px 18px; border-radius: 10px; font-weight: 600; font-size: .9rem;
    }
    a.plain { color: #ff8a55; }
  </style>
  <script>
    // The native app registers the com.lovable.ultrarunquest:// scheme (its
    // real, already-published package id). Bounce the Strava OAuth "code" (or
    // "error") straight into the app. If App Links are verified, the OS opens
    // the app before this page ever loads; this is the fallback for when it
    // doesn't.
    (function () {
      var appLink = 'com.lovable.ultrarunquest://strava-callback' + (window.location.search || '');
      // Give the browser a tick to render, then hand off to the app.
      window.setTimeout(function () { window.location.replace(appLink); }, 50);
      window.__appLink = appLink;
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Opening the UltraQuest app…</h1>
    <p>Finishing your Strava connection. If the app doesn't open automatically, tap below.</p>
    <a class="btn" id="open" href="#">Open UltraQuest</a>
    <p style="margin-top:18px">Don't have the app yet? <a class="plain" href="/">Get UltraQuest</a></p>
  </div>
  <script>
    document.getElementById('open').setAttribute('href', window.__appLink);
  </script>
</body>
</html>
